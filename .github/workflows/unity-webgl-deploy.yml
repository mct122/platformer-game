name: Unity WebGL Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages へのデプロイ権限
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Unity WebGL
    runs-on: ubuntu-latest
    steps:
      # --------------------------------------------------------
      # 1. チェックアウト (LFS 対応)
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Git LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.gitattributes') }}-${{ github.sha }}
          restore-keys: lfs-${{ hashFiles('.gitattributes') }}-

      # --------------------------------------------------------
      # 2. Unity ライブラリキャッシュ (ビルド高速化)
      # --------------------------------------------------------
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      # --------------------------------------------------------
      # 3. Unity WebGL ビルド (game.ci)
      #    GitHub Secrets に以下を設定してください:
      #      UNITY_LICENSE     : Unity ライセンスの XML (Personal は手動取得)
      #      UNITY_EMAIL       : Unity アカウントのメールアドレス
      #      UNITY_PASSWORD    : Unity アカウントのパスワード
      # --------------------------------------------------------
      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.2f1
          targetPlatform: WebGL
          buildsPath: build
          buildName: SuperRetroPlatformer
          # WebGL 向け追加設定
          allowDirtyBuild: false

      # --------------------------------------------------------
      # 4. ビルド成果物をアップロード
      # --------------------------------------------------------
      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/WebGL/SuperRetroPlatformer

  # --------------------------------------------------------
  # 5. GitHub Pages へデプロイ
  # --------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
